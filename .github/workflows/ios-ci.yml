name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Xcode 16.4 / iOS 18.5
    runs-on: macos-15
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Record Apple toolchain
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          xcrun swift --version

      - name: Enforce offline architecture
        run: xcrun swift Scripts/NetworkBoundaryScanner.swift --build-check "$GITHUB_WORKSPACE"

      - name: Validate project discovery
        run: xcodebuild -list -json -project Hippocrates.xcodeproj

      - name: Prove the build rejects planted networking code
        run: |
          probe="$RUNNER_TEMP/HippocratesBoundaryProbe"
          log="$RUNNER_TEMP/HippocratesBoundaryProbe.log"
          cp -R "$GITHUB_WORKSPACE" "$probe"
          printf '\nprivate let plantedNetworkBoundaryViolation = URLSession.shared\n' \
            >> "$probe/Hippocrates/App/RootView.swift"

          set +e
          xcodebuild build \
            -project "$probe/Hippocrates.xcodeproj" \
            -scheme Hippocrates \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/BoundaryProbeDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            > "$log" 2>&1
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            sed -n '1,240p' "$log"
            echo "error: the planted network reference did not fail the Xcode build"
            exit 1
          fi

          if ! grep -Fq "URLSession violates the no-network boundary" "$log"; then
            sed -n '1,240p' "$log"
            echo "error: the boundary probe failed for an unexpected reason"
            exit 1
          fi

          echo "The Xcode build rejected the planted network reference as required."

      - name: Build release configuration
        run: |
          xcodebuild build \
            -project Hippocrates.xcodeproj \
            -scheme Hippocrates \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Run static analyzer
        run: |
          xcodebuild analyze \
            -project Hippocrates.xcodeproj \
            -scheme Hippocrates \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Build and test
        run: |
          xcodebuild test \
            -project Hippocrates.xcodeproj \
            -scheme Hippocrates \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -resultBundlePath "$RUNNER_TEMP/HippocratesTests.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
