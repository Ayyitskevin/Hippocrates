name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Xcode 16.4 / iOS 18.5
    runs-on: macos-15
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Record Apple toolchain
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          xcrun swift --version

      - name: Enforce offline architecture
        run: /usr/bin/xcrun swift Scripts/NetworkBoundaryScanner.swift --build-check "$GITHUB_WORKSPACE"

      - name: Validate project discovery
        run: xcodebuild -list -json -project Hippocrates.xcodeproj

      - name: Verify RXcalc review bundle and packet JSON
        run: |
          Scripts/rxcalc-review-packet.sh --verify
          for packet in docs/clinical-review/rxcalc-r1-v1/*.json; do
            python3 -m json.tool "$packet" >/dev/null
          done

          python3 - <<'PY'
          import json
          schema = json.load(open("docs/clinical-review/rxcalc-r1-v1/packet-schema.json"))
          formula_ids = [item["const"] for item in schema["properties"]["formula_ids"]["prefixItems"]]
          expected_refs = {
              "renal_clinical_reviewer": "#/$defs/renalCoverage",
              "clinical_pharmacy_body_size_reviewer": "#/$defs/bodySizeCoverage",
              "independent_computational_release_verifier": "#/$defs/allFormulaCoverage",
          }
          role_refs = {}
          for rule in schema["allOf"]:
              role = rule.get("if", {}).get("properties", {}).get("reviewer_role", {}).get("const")
              if role:
                  role_refs[role] = rule["then"]["properties"]["formula_coverage"]["$ref"]
          assert role_refs == expected_refs
          for role, reference in expected_refs.items():
              definition = schema["$defs"][reference.rsplit("/", 1)[1]]
              expected = formula_ids if "independent" in role else formula_ids[:2] if "renal" in role else formula_ids[2:]
              assert [item["const"] for item in definition["prefixItems"]] == expected
              assert definition["minItems"] == definition["maxItems"] == len(expected)
              assert definition["items"] is False
          required = set(schema["required"])
          assert {"review_set_id", "external_evidence_manifest_sha256", "signature_payload"} <= required
          assert schema["properties"]["signature_payload"]["const"] == "exact_reviewer_record_bytes"
          methods = set(schema["properties"]["signature_method"]["enum"])
          assert methods == {"openssh_sshsig_detached", "openpgp_detached", "cms_detached"}
          print("RXcalc reviewer-record schema contract passed.")
          PY
      - name: Prove the RXcalc review bundle rejects planted drift
        run: |
          probe="$RUNNER_TEMP/HippocratesRXcalcReviewProbe"
          log="$RUNNER_TEMP/HippocratesRXcalcReviewProbe.log"
          cp -R "$GITHUB_WORKSPACE" "$probe"
          echo "// planted review-bundle drift" >> "$probe/Hippocrates/Features/RXCalc/RXCalculatorCatalog.swift"

          set +e
          "$probe/Scripts/rxcalc-review-packet.sh" --verify > "$log" 2>&1
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            sed -n '1,160p' "$log"
            echo "error: planted RXcalc review-bundle drift did not fail verification"
            exit 1
          fi
          if ! grep -Fq "RXcalc review bundle verification failed: tracked manifest does not match current files" "$log"; then
            sed -n '1,160p' "$log"
            echo "error: RXcalc review-bundle probe did not report the stable diagnostic"
            exit 1
          fi

          closure_probe="$RUNNER_TEMP/HippocratesRXcalcClosureProbe"
          closure_log="$RUNNER_TEMP/HippocratesRXcalcClosureProbe.log"
          cp -R "$GITHUB_WORKSPACE" "$closure_probe"
          ln -s "$RUNNER_TEMP/rxcalc-missing-target" \
            "$closure_probe/Hippocrates/Features/RXCalc/.Dangling.swift"

          set +e
          "$closure_probe/Scripts/rxcalc-review-packet.sh" --verify > "$closure_log" 2>&1
          closure_status=$?
          set -e

          if [ "$closure_status" -eq 0 ]; then
            sed -n '1,160p' "$closure_log"
            echo "error: dangling RXcalc source symlink did not fail verification"
            exit 1
          fi
          if ! grep -Fq "RXcalc directory contains a non-regular file or symbolic link" "$closure_log"; then
            sed -n '1,160p' "$closure_log"
            echo "error: dangling RXcalc source probe did not report the stable diagnostic"
            exit 1
          fi

          run_packet_probe() {
            packet_probe=$1
            packet_log=$2
            expected=$3
            label=$4
            set +e
            "$packet_probe/Scripts/rxcalc-review-packet.sh" --verify > "$packet_log" 2>&1
            packet_status=$?
            set -e
            if [ "$packet_status" -eq 0 ]; then
              sed -n '1,160p' "$packet_log"
              echo "error: $label did not fail verification"
              exit 1
            fi
            if ! grep -Fq "$expected" "$packet_log"; then
              sed -n '1,160p' "$packet_log"
              echo "error: $label did not report the stable diagnostic"
              exit 1
            fi
          }

          packet_probe="$RUNNER_TEMP/HippocratesRXcalcPacketClosureProbe"
          packet_log="$RUNNER_TEMP/HippocratesRXcalcPacketClosureProbe.log"
          cp -R "$GITHUB_WORKSPACE" "$packet_probe"
          printf '{}\n' \
            > "$packet_probe/docs/clinical-review/rxcalc-r1-v1/.planted-review.json"
          run_packet_probe \
            "$packet_probe" \
            "$packet_log" \
            "RXcalc review packet directory differs from the exact reviewed file set" \
            "hidden RXcalc packet entry"

          packet_probe="$RUNNER_TEMP/HippocratesRXcalcAllowlistEOFProbe"
          packet_log="$RUNNER_TEMP/HippocratesRXcalcAllowlistEOFProbe.log"
          cp -R "$GITHUB_WORKSPACE" "$packet_probe"
          /usr/bin/perl -0pi -e 's/\n\z//' \
            "$packet_probe/docs/clinical-review/rxcalc-r1-v1/bundle-files.txt"
          run_packet_probe \
            "$packet_probe" \
            "$packet_log" \
            "bundle allowlist must end with a line feed" \
            "unterminated RXcalc bundle allowlist"

          packet_probe="$RUNNER_TEMP/HippocratesRXcalcAllowlistTabProbe"
          packet_log="$RUNNER_TEMP/HippocratesRXcalcAllowlistTabProbe.log"
          cp -R "$GITHUB_WORKSPACE" "$packet_probe"
          /usr/bin/perl -0pi -e 's/\t/\t\t/' \
            "$packet_probe/docs/clinical-review/rxcalc-r1-v1/bundle-files.txt"
          run_packet_probe \
            "$packet_probe" \
            "$packet_log" \
            "must contain exactly class<TAB>path" \
            "multi-TAB RXcalc bundle allowlist"

          packet_probe="$RUNNER_TEMP/HippocratesRXcalcRequiredPacketProbe"
          packet_log="$RUNNER_TEMP/HippocratesRXcalcRequiredPacketProbe.log"
          cp -R "$GITHUB_WORKSPACE" "$packet_probe"
          rm "$packet_probe/docs/clinical-review/rxcalc-r1-v1/reviewer-checklist.md"
          /usr/bin/perl -ni -e 'print unless /reviewer-checklist\.md/' \
            "$packet_probe/docs/clinical-review/rxcalc-r1-v1/bundle-files.txt"
          run_packet_probe \
            "$packet_probe" \
            "$packet_log" \
            "bundle allowlist is missing required packet path" \
            "shrunken RXcalc review packet"

          packet_probe="$RUNNER_TEMP/HippocratesRXcalcManifestRecursionProbe"
          packet_log="$RUNNER_TEMP/HippocratesRXcalcManifestRecursionProbe.log"
          cp -R "$GITHUB_WORKSPACE" "$packet_probe"
          /usr/bin/perl -0pi -e 's#(immutable\tdocs/clinical-review/rxcalc-r1-v1/bundle-files\.txt\n)#$1immutable\tdocs/clinical-review/rxcalc-r1-v1/bundle.sha256\n# or die "bundle-files anchor not found\n"' \
            "$packet_probe/docs/clinical-review/rxcalc-r1-v1/bundle-files.txt"
          run_packet_probe \
            "$packet_probe" \
            "$packet_log" \
            "bundle allowlist must exclude its recursive tracked manifest" \
            "recursive RXcalc bundle manifest"

          echo "The RXcalc review-bundle verifier rejected content drift, dangling sources," \
            "hidden packet entries, malformed/shrunken allowlists, and manifest recursion."

      - name: Prove the direct scanner rejects planted boundary, backup-contract, and privacy-manifest violations
        run: |
          probe="$RUNNER_TEMP/HippocratesDirectBoundaryProbe"
          log="$RUNNER_TEMP/HippocratesDirectBoundaryProbe.log"
          cp -R "$GITHUB_WORKSPACE" "$probe"
          printf '\nprivate let plantedNetworkBoundaryViolation = URLSession.shared\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate struct PlantedFileImportSurface: View { @State private var presented = false; var body: some View { EmptyView().fileImporter(isPresented: $presented, allowedContentTypes: []) { result in guard case let .success(file) = result else { return }; let didStartAccess = file.startAccessingSecurityScopedResource(); defer { if didStartAccess { file.stopAccessingSecurityScopedResource() } }; _ = FileManager.default.contents(atPath: file.path); _ = InputStream.init(fileAtPath: file.path) }.onDrop(of: [], isTargeted: nil) { _ in false } } }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate func plantedAppConfigOwnershipViolation() throws { let authority = AppConfigService.Authority(); let configuration = AppConfig(stalenessIntervalMonths: nil, lastExportAt: nil, authority: authority); try configuration.updateStalenessIntervalMonths(6, authority: authority) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate final class PlantedAuthorityDecoy {}; private func plantedFabricate<T: AnyObject>(_ object: AnyObject) -> T { Unmanaged<T>.fromOpaque(Unmanaged.passUnretained(object).toOpaque()).takeUnretainedValue() }; private func plantedOpaqueAuthorityViolation() -> AppConfig { .init(stalenessIntervalMonths: 6, lastExportAt: nil, authority: plantedFabricate(PlantedAuthorityDecoy())) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate func plantedBackingDataAuthorityViolation(_ existing: AppConfig) -> AppConfig { .init(backingData: existing.persistentBackingData) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate func plantedAppConfigLifecycleViolation(_ context: ModelContext, _ configuration: AppConfig) { context.delete(configuration); configuration.setValue(forKey: \.stalenessIntervalMonths, to: 6) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate struct PlantedRenalEquation {}; private struct PlantedDosingRule {}; private func calculateDoseForProbe() {}\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate let plantedRXCalcPersistenceCoupling = UserDefaults.standard; private let plantedUnreviewedRXCalcDivision = 1 / 2\n' \
            >> "$probe/Hippocrates/Features/RXCalc/RXCalculations.swift"
          printf '\nextension RXClinicalReviewStatus: Codable { static func reviewed(reviewedOn: String, nextReviewDueOn: String) -> Self { .draft } }\n' \
            >> "$probe/Hippocrates/Features/RXCalc/RXClinicalReviewRegistry.swift"
          printf 'struct PlantedOrphanSource {}\n' \
            > "$probe/Hippocrates/App/PlantedOrphan.swift"
          printf 'unreviewed resource\n' \
            > "$probe/Hippocrates/Resources/Unexpected.txt"
          printf '\nprivate let plantedRemoteTestLoader = try? Data(contentsOf: URL(string: "https://example.invalid/source")!)\n' \
            >> "$probe/HippocratesTests/SchemaContractTests.swift"
          /usr/bin/perl -0pi -e 's#(<key>NSPrivacyTracking</key>\s*)<false/>#$1<true/># or die "reviewed privacy-manifest tracking value not found\n"' \
            "$probe/Hippocrates/Resources/PrivacyInfo.xcprivacy"
          /usr/bin/perl -0pi -e 's/SWIFT_TREAT_WARNINGS_AS_ERRORS = YES;/SWIFT_TREAT_WARNINGS_AS_ERRORS = NO;/ or die "reviewed config value not found\n"' \
            "$probe/Hippocrates.xcodeproj/project.pbxproj"
          /usr/bin/perl -0pi -e 's/fileprivate init\(\) \{\}/init() {}/ or die "reviewed AppConfig authority initializer not found\n"' \
            "$probe/Hippocrates/Persistence/AppConfigService.swift"
          /usr/bin/perl -0pi -e 's/(final class DrugClass \{\n        \@Attribute\(\.unique\) var id: UUID\n        var label: String\n)/$1        var plantedBackupParityDrift: String?\n/ or die "reviewed DrugClass schema anchor not found\n"' \
            "$probe/Hippocrates/Persistence/SchemaV1.swift"
          /usr/bin/perl -0pi -e 's/(    var payload: Payload\n)/$1\n    private enum CodingKeys: String, CodingKey { case formatVersion = "version"; case createdAt; case payload }\n/ or die "reviewed BackupArchive payload anchor not found\n"' \
            "$probe/Hippocrates/Backup/BackupArchive.swift"
          /usr/bin/perl -0pi -e 's/(        struct InterventionTypeRecord: Decodable \{\n            let id: UUID\n)            let label: String/$1            var label: String/ or die "reviewed BackupArchive v1 record anchor not found\n"' \
            "$probe/Hippocrates/Backup/BackupCodec.swift"

          set +e
          /usr/bin/xcrun swift "$probe/Scripts/NetworkBoundaryScanner.swift" \
            --build-check "$probe" \
            > "$log" 2>&1
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            sed -n '1,280p' "$log"
            echo "error: planted boundary violations did not fail the direct scanner"
            exit 1
          fi

          for expected in \
            "URLSession violates the no-network boundary" \
            "File-picker and document-browser surfaces require explicit local-file boundary review" \
            "External drop, paste, item-provider, and activity ingress requires explicit restore-boundary review" \
            "Security-scoped file access requires the reviewed local-file adapter" \
            "Path-based file access requires explicit local-file boundary review" \
            "URL-backed initializers and URL/path-backed streams require explicit local-file boundary review" \
            "AppConfig authority changed outside the reviewed service seam" \
            "AppConfig construction is owned exclusively by AppConfigService" \
            "AppConfig staleness mutation is owned exclusively by AppConfigService" \
            "Dynamic invocation, unsafe memory, and runtime symbol lookup are forbidden inside the reviewed source boundary" \
            "Model deletion requires an explicitly reviewed lifecycle service" \
            "SwiftData backing-data APIs bypass reviewed model initialization" \
            "Clinical calculation types must live in the reviewed RXcalc feature boundary" \
            "Dose-selection types require separately approved clinical governance" \
            "Dose-selection declarations require separately approved clinical governance" \
            "RXcalc must remain stateless and isolated from persisted app state" \
            "RXcalc reviewed status has no production construction path" \
            "RXcalc arithmetic changed outside reviewed formula division seams" \
            "SchemaV1 persisted-property surface changed without backup-format review" \
            "BackupArchive DTOs must retain synthesized Codable and memberwise initialization" \
            "BackupArchive v1 decoder changed outside immutable compatibility contract" \
            "App-target Swift source exists on disk but is missing from target Sources" \
            "Unreviewed file exists beneath Hippocrates/Resources" \
            "contentsOf URL loading is forbidden" \
            "PrivacyInfo.xcprivacy must declare exactly no tracking and no collected data" \
            "Xcode build configurations changed outside the reviewed allowlist"
          do
            if ! grep -Fq "$expected" "$log"; then
              sed -n '1,280p' "$log"
              echo "error: boundary probe did not report: $expected"
              exit 1
            fi
          done

          echo "The direct scanner rejected planted network, file-ingress, AppConfig-ownership, RXcalc-boundary, persisted-schema, current-backup-shape, historical-backup-decoder, source, resource, test-loader, privacy-manifest, and configuration violations."

      - name: Prove the sandboxed Xcode build rejects declared-input boundary, backup-contract, and privacy-manifest violations
        run: |
          probe="$RUNNER_TEMP/HippocratesXcodeBoundaryProbe"
          log="$RUNNER_TEMP/HippocratesXcodeBoundaryProbe.log"
          cp -R "$GITHUB_WORKSPACE" "$probe"
          printf '\nprivate let plantedNetworkBoundaryViolation = URLSession.shared\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate struct PlantedFileImportSurface: View { @State private var presented = false; var body: some View { EmptyView().fileImporter(isPresented: $presented, allowedContentTypes: []) { result in guard case let .success(file) = result else { return }; let didStartAccess = file.startAccessingSecurityScopedResource(); defer { if didStartAccess { file.stopAccessingSecurityScopedResource() } }; _ = FileManager.default.contents(atPath: file.path); _ = InputStream.init(fileAtPath: file.path) }.onDrop(of: [], isTargeted: nil) { _ in false } } }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate func plantedAppConfigOwnershipViolation() throws { let authority = AppConfigService.Authority(); let configuration = AppConfig(stalenessIntervalMonths: nil, lastExportAt: nil, authority: authority); try configuration.updateStalenessIntervalMonths(6, authority: authority) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate final class PlantedAuthorityDecoy {}; private func plantedFabricate<T: AnyObject>(_ object: AnyObject) -> T { Unmanaged<T>.fromOpaque(Unmanaged.passUnretained(object).toOpaque()).takeUnretainedValue() }; private func plantedOpaqueAuthorityViolation() -> AppConfig { .init(stalenessIntervalMonths: 6, lastExportAt: nil, authority: plantedFabricate(PlantedAuthorityDecoy())) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate func plantedBackingDataAuthorityViolation(_ existing: AppConfig) -> AppConfig { .init(backingData: existing.persistentBackingData) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate func plantedAppConfigLifecycleViolation(_ context: ModelContext, _ configuration: AppConfig) { context.delete(configuration); configuration.setValue(forKey: \.stalenessIntervalMonths, to: 6) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate struct PlantedRenalEquation {}; private struct PlantedDosingRule {}; private func calculateDoseForProbe() {}\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate let plantedRXCalcPersistenceCoupling = UserDefaults.standard; private let plantedUnreviewedRXCalcDivision = 1 / 2\n' \
            >> "$probe/Hippocrates/Features/RXCalc/RXCalculations.swift"
          printf '\nextension RXClinicalReviewStatus: Codable { static func reviewed(reviewedOn: String, nextReviewDueOn: String) -> Self { .draft } }\n' \
            >> "$probe/Hippocrates/Features/RXCalc/RXClinicalReviewRegistry.swift"
          printf '\nprivate let plantedRemoteTestLoader = try? Data(contentsOf: URL(string: "https://example.invalid/source")!)\n' \
            >> "$probe/HippocratesTests/SchemaContractTests.swift"
          /usr/bin/perl -0pi -e 's#(<key>NSPrivacyTracking</key>\s*)<false/>#$1<true/># or die "reviewed privacy-manifest tracking value not found\n"' \
            "$probe/Hippocrates/Resources/PrivacyInfo.xcprivacy"
          /usr/bin/perl -0pi -e 's/SWIFT_TREAT_WARNINGS_AS_ERRORS = YES;/SWIFT_TREAT_WARNINGS_AS_ERRORS = NO;/ or die "reviewed config value not found\n"' \
            "$probe/Hippocrates.xcodeproj/project.pbxproj"
          /usr/bin/perl -0pi -e 's/fileprivate init\(\) \{\}/init() {}/ or die "reviewed AppConfig authority initializer not found\n"' \
            "$probe/Hippocrates/Persistence/AppConfigService.swift"

          /usr/bin/perl -0pi -e 's/(final class DrugClass \{\n        \@Attribute\(\.unique\) var id: UUID\n        var label: String\n)/$1        var plantedBackupParityDrift: String?\n/ or die "reviewed DrugClass schema anchor not found\n"' \
            "$probe/Hippocrates/Persistence/SchemaV1.swift"
          /usr/bin/perl -0pi -e 's/(    var payload: Payload\n)/$1\n    private enum CodingKeys: String, CodingKey { case formatVersion = "version"; case createdAt; case payload }\n/ or die "reviewed BackupArchive payload anchor not found\n"' \
            "$probe/Hippocrates/Backup/BackupArchive.swift"
          /usr/bin/perl -0pi -e 's/(        struct InterventionTypeRecord: Decodable \{\n            let id: UUID\n)            let label: String/$1            var label: String/ or die "reviewed BackupArchive v1 record anchor not found\n"' \
            "$probe/Hippocrates/Backup/BackupCodec.swift"
          set +e
          xcodebuild build \
            -project "$probe/Hippocrates.xcodeproj" \
            -scheme Hippocrates \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/XcodeBoundaryProbeDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            > "$log" 2>&1
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            sed -n '1,280p' "$log"
            echo "error: declared-input violations did not fail the sandboxed Xcode build"
            exit 1
          fi

          for expected in \
            "URLSession violates the no-network boundary" \
            "File-picker and document-browser surfaces require explicit local-file boundary review" \
            "External drop, paste, item-provider, and activity ingress requires explicit restore-boundary review" \
            "Security-scoped file access requires the reviewed local-file adapter" \
            "Path-based file access requires explicit local-file boundary review" \
            "URL-backed initializers and URL/path-backed streams require explicit local-file boundary review" \
            "AppConfig authority changed outside the reviewed service seam" \
            "AppConfig construction is owned exclusively by AppConfigService" \
            "AppConfig staleness mutation is owned exclusively by AppConfigService" \
            "Dynamic invocation, unsafe memory, and runtime symbol lookup are forbidden inside the reviewed source boundary" \
            "Model deletion requires an explicitly reviewed lifecycle service" \
            "SwiftData backing-data APIs bypass reviewed model initialization" \
            "Clinical calculation types must live in the reviewed RXcalc feature boundary" \
            "Dose-selection types require separately approved clinical governance" \
            "Dose-selection declarations require separately approved clinical governance" \
            "RXcalc must remain stateless and isolated from persisted app state" \
            "RXcalc reviewed status has no production construction path" \
            "RXcalc arithmetic changed outside reviewed formula division seams" \
            "SchemaV1 persisted-property surface changed without backup-format review" \
            "BackupArchive DTOs must retain synthesized Codable and memberwise initialization" \
            "BackupArchive v1 decoder changed outside immutable compatibility contract" \
            "contentsOf URL loading is forbidden" \
            "PrivacyInfo.xcprivacy must declare exactly no tracking and no collected data" \
            "Xcode build configurations changed outside the reviewed allowlist"
          do
            if ! grep -Fq "$expected" "$log"; then
              sed -n '1,280p' "$log"
              echo "error: sandboxed Xcode probe did not report: $expected"
              exit 1
            fi
          done

          echo "The sandboxed Xcode build ran the boundary phase and rejected every declared-input network, file-ingress, AppConfig-ownership, RXcalc-boundary, persisted-schema, current-backup-shape, historical-backup-decoder, loader, privacy-manifest, and configuration violation."

      - name: Build release configuration
        run: |
          xcodebuild build \
            -project Hippocrates.xcodeproj \
            -scheme Hippocrates \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Run static analyzer
        run: |
          xcodebuild analyze \
            -project Hippocrates.xcodeproj \
            -scheme Hippocrates \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Build and test
        run: |
          xcodebuild test \
            -project Hippocrates.xcodeproj \
            -scheme Hippocrates \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -resultBundlePath "$RUNNER_TEMP/HippocratesTests.xcresult" \
            -skip-testing:HippocratesUITests \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Audit RXcalc catalog at Accessibility 5
        run: |
          set -euo pipefail

          simulator_id="$(xcrun simctl create \
            Hippocrates-RXcalc-A11y5 \
            com.apple.CoreSimulator.SimDeviceType.iPhone-SE-3rd-generation \
            com.apple.CoreSimulator.SimRuntime.iOS-18-5)"

          cleanup_simulator() {
            xcrun simctl shutdown "$simulator_id" >/dev/null 2>&1 || true
            xcrun simctl delete "$simulator_id" >/dev/null 2>&1 || true
          }
          trap cleanup_simulator EXIT

          xcrun simctl boot "$simulator_id"
          xcrun simctl bootstatus "$simulator_id" -b
          xcrun simctl ui \
            "$simulator_id" \
            content_size \
            accessibility-extra-extra-extra-large

          actual_content_size="$(xcrun simctl ui "$simulator_id" content_size)"
          if [ "$actual_content_size" != "accessibility-extra-extra-extra-large" ]; then
            echo "error: simulator content size is $actual_content_size, expected Accessibility 5"
            exit 1
          fi

          xcodebuild test \
            -project Hippocrates.xcodeproj \
            -scheme Hippocrates \
            -destination "platform=iOS Simulator,id=$simulator_id" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -resultBundlePath "$RUNNER_TEMP/HippocratesRXCalcAccessibilityTests.xcresult" \
            -only-testing:HippocratesUITests/RXCalcCatalogAccessibilityTests/testCatalogAtAccessibility5OnCompactPhone \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Preserve RXcalc accessibility evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: rxcalc-accessibility-${{ github.sha }}
