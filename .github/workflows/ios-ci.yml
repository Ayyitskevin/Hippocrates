name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Xcode 16.4 / iOS 18.5
    runs-on: macos-15
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Record Apple toolchain
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          xcrun swift --version

      - name: Enforce offline architecture
        run: /usr/bin/xcrun swift Scripts/NetworkBoundaryScanner.swift --build-check "$GITHUB_WORKSPACE"

      - name: Validate project discovery
        run: xcodebuild -list -json -project Hippocrates.xcodeproj

      - name: Prove the direct scanner rejects planted boundary and backup-contract violations
        run: |
          probe="$RUNNER_TEMP/HippocratesDirectBoundaryProbe"
          log="$RUNNER_TEMP/HippocratesDirectBoundaryProbe.log"
          cp -R "$GITHUB_WORKSPACE" "$probe"
          printf '\nprivate let plantedNetworkBoundaryViolation = URLSession.shared\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate struct PlantedFileImportSurface: View { @State private var presented = false; var body: some View { EmptyView().fileImporter(isPresented: $presented, allowedContentTypes: []) { result in guard case let .success(file) = result else { return }; let didStartAccess = file.startAccessingSecurityScopedResource(); defer { if didStartAccess { file.stopAccessingSecurityScopedResource() } }; _ = FileManager.default.contents(atPath: file.path); _ = InputStream.init(fileAtPath: file.path) }.onDrop(of: [], isTargeted: nil) { _ in false } } }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate func plantedAppConfigOwnershipViolation() throws { let authority = AppConfigService.Authority(); let configuration = AppConfig(stalenessIntervalMonths: nil, lastExportAt: nil, authority: authority); try configuration.updateStalenessIntervalMonths(6, authority: authority) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate final class PlantedAuthorityDecoy {}; private func plantedFabricate<T: AnyObject>(_ object: AnyObject) -> T { Unmanaged<T>.fromOpaque(Unmanaged.passUnretained(object).toOpaque()).takeUnretainedValue() }; private func plantedOpaqueAuthorityViolation() -> AppConfig { .init(stalenessIntervalMonths: 6, lastExportAt: nil, authority: plantedFabricate(PlantedAuthorityDecoy())) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate func plantedBackingDataAuthorityViolation(_ existing: AppConfig) -> AppConfig { .init(backingData: existing.persistentBackingData) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate func plantedAppConfigLifecycleViolation(_ context: ModelContext, _ configuration: AppConfig) { context.delete(configuration); configuration.setValue(forKey: \.stalenessIntervalMonths, to: 6) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf 'struct PlantedOrphanSource {}\n' \
            > "$probe/Hippocrates/App/PlantedOrphan.swift"
          printf 'unreviewed resource\n' \
            > "$probe/Hippocrates/Resources/Unexpected.txt"
          printf '\nprivate let plantedRemoteTestLoader = try? Data(contentsOf: URL(string: "https://example.invalid/source")!)\n' \
            >> "$probe/HippocratesTests/SchemaContractTests.swift"
          /usr/bin/perl -0pi -e 's/SWIFT_TREAT_WARNINGS_AS_ERRORS = YES;/SWIFT_TREAT_WARNINGS_AS_ERRORS = NO;/ or die "reviewed config value not found\n"' \
            "$probe/Hippocrates.xcodeproj/project.pbxproj"
          /usr/bin/perl -0pi -e 's/fileprivate init\(\) \{\}/init() {}/ or die "reviewed AppConfig authority initializer not found\n"' \
            "$probe/Hippocrates/Persistence/AppConfigService.swift"
          /usr/bin/perl -0pi -e 's/(final class DrugClass \{\n        \@Attribute\(\.unique\) var id: UUID\n        var label: String\n)/$1        var plantedBackupParityDrift: String?\n/ or die "reviewed DrugClass schema anchor not found\n"' \
            "$probe/Hippocrates/Persistence/SchemaV1.swift"
          /usr/bin/perl -0pi -e 's/(    var payload: Payload\n)/$1\n    private enum CodingKeys: String, CodingKey { case formatVersion = "version"; case createdAt; case payload }\n/ or die "reviewed BackupArchive payload anchor not found\n"' \
            "$probe/Hippocrates/Backup/BackupArchive.swift"
          /usr/bin/perl -0pi -e 's/(        struct InterventionTypeRecord: Decodable \{\n            let id: UUID\n)            let label: String/$1            var label: String/ or die "reviewed BackupArchive v1 record anchor not found\n"' \
            "$probe/Hippocrates/Backup/BackupCodec.swift"

          set +e
          /usr/bin/xcrun swift "$probe/Scripts/NetworkBoundaryScanner.swift" \
            --build-check "$probe" \
            > "$log" 2>&1
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            sed -n '1,280p' "$log"
            echo "error: planted boundary violations did not fail the direct scanner"
            exit 1
          fi

          for expected in \
            "URLSession violates the no-network boundary" \
            "File-picker and document-browser surfaces require explicit local-file boundary review" \
            "External drop, paste, item-provider, and activity ingress requires explicit restore-boundary review" \
            "Security-scoped file access requires the reviewed local-file adapter" \
            "Path-based file access requires explicit local-file boundary review" \
            "URL-backed initializers and URL/path-backed streams require explicit local-file boundary review" \
            "AppConfig authority changed outside the reviewed service seam" \
            "AppConfig construction is owned exclusively by AppConfigService" \
            "AppConfig staleness mutation is owned exclusively by AppConfigService" \
            "Dynamic invocation, unsafe memory, and runtime symbol lookup are forbidden inside the reviewed source boundary" \
            "Model deletion requires an explicitly reviewed lifecycle service" \
            "SwiftData backing-data APIs bypass reviewed model initialization" \
            "SchemaV1 persisted-property surface changed without backup-format review" \
            "BackupArchive DTOs must retain synthesized Codable and memberwise initialization" \
            "BackupArchive v1 decoder changed outside immutable compatibility contract" \
            "App-target Swift source exists on disk but is missing from target Sources" \
            "Unreviewed file exists beneath Hippocrates/Resources" \
            "contentsOf URL loading is forbidden" \
            "Xcode build configurations changed outside the reviewed allowlist"
          do
            if ! grep -Fq "$expected" "$log"; then
              sed -n '1,280p' "$log"
              echo "error: boundary probe did not report: $expected"
              exit 1
            fi
          done

          echo "The direct scanner rejected planted network, file-ingress, AppConfig-ownership, persisted-schema, current-backup-shape, historical-backup-decoder, source, resource, test-loader, and configuration violations."

      - name: Prove the sandboxed Xcode build rejects declared-input boundary and backup-contract violations
        run: |
          probe="$RUNNER_TEMP/HippocratesXcodeBoundaryProbe"
          log="$RUNNER_TEMP/HippocratesXcodeBoundaryProbe.log"
          cp -R "$GITHUB_WORKSPACE" "$probe"
          printf '\nprivate let plantedNetworkBoundaryViolation = URLSession.shared\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate struct PlantedFileImportSurface: View { @State private var presented = false; var body: some View { EmptyView().fileImporter(isPresented: $presented, allowedContentTypes: []) { result in guard case let .success(file) = result else { return }; let didStartAccess = file.startAccessingSecurityScopedResource(); defer { if didStartAccess { file.stopAccessingSecurityScopedResource() } }; _ = FileManager.default.contents(atPath: file.path); _ = InputStream.init(fileAtPath: file.path) }.onDrop(of: [], isTargeted: nil) { _ in false } } }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate func plantedAppConfigOwnershipViolation() throws { let authority = AppConfigService.Authority(); let configuration = AppConfig(stalenessIntervalMonths: nil, lastExportAt: nil, authority: authority); try configuration.updateStalenessIntervalMonths(6, authority: authority) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate final class PlantedAuthorityDecoy {}; private func plantedFabricate<T: AnyObject>(_ object: AnyObject) -> T { Unmanaged<T>.fromOpaque(Unmanaged.passUnretained(object).toOpaque()).takeUnretainedValue() }; private func plantedOpaqueAuthorityViolation() -> AppConfig { .init(stalenessIntervalMonths: 6, lastExportAt: nil, authority: plantedFabricate(PlantedAuthorityDecoy())) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate func plantedBackingDataAuthorityViolation(_ existing: AppConfig) -> AppConfig { .init(backingData: existing.persistentBackingData) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate func plantedAppConfigLifecycleViolation(_ context: ModelContext, _ configuration: AppConfig) { context.delete(configuration); configuration.setValue(forKey: \.stalenessIntervalMonths, to: 6) }\n' \
            >> "$probe/Hippocrates/App/RootView.swift"
          printf '\nprivate let plantedRemoteTestLoader = try? Data(contentsOf: URL(string: "https://example.invalid/source")!)\n' \
            >> "$probe/HippocratesTests/SchemaContractTests.swift"
          /usr/bin/perl -0pi -e 's/SWIFT_TREAT_WARNINGS_AS_ERRORS = YES;/SWIFT_TREAT_WARNINGS_AS_ERRORS = NO;/ or die "reviewed config value not found\n"' \
            "$probe/Hippocrates.xcodeproj/project.pbxproj"
          /usr/bin/perl -0pi -e 's/fileprivate init\(\) \{\}/init() {}/ or die "reviewed AppConfig authority initializer not found\n"' \
            "$probe/Hippocrates/Persistence/AppConfigService.swift"

          /usr/bin/perl -0pi -e 's/(final class DrugClass \{\n        \@Attribute\(\.unique\) var id: UUID\n        var label: String\n)/$1        var plantedBackupParityDrift: String?\n/ or die "reviewed DrugClass schema anchor not found\n"' \
            "$probe/Hippocrates/Persistence/SchemaV1.swift"
          /usr/bin/perl -0pi -e 's/(    var payload: Payload\n)/$1\n    private enum CodingKeys: String, CodingKey { case formatVersion = "version"; case createdAt; case payload }\n/ or die "reviewed BackupArchive payload anchor not found\n"' \
            "$probe/Hippocrates/Backup/BackupArchive.swift"
          /usr/bin/perl -0pi -e 's/(        struct InterventionTypeRecord: Decodable \{\n            let id: UUID\n)            let label: String/$1            var label: String/ or die "reviewed BackupArchive v1 record anchor not found\n"' \
            "$probe/Hippocrates/Backup/BackupCodec.swift"
          set +e
          xcodebuild build \
            -project "$probe/Hippocrates.xcodeproj" \
            -scheme Hippocrates \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/XcodeBoundaryProbeDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            > "$log" 2>&1
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            sed -n '1,280p' "$log"
            echo "error: declared-input violations did not fail the sandboxed Xcode build"
            exit 1
          fi

          for expected in \
            "URLSession violates the no-network boundary" \
            "File-picker and document-browser surfaces require explicit local-file boundary review" \
            "External drop, paste, item-provider, and activity ingress requires explicit restore-boundary review" \
            "Security-scoped file access requires the reviewed local-file adapter" \
            "Path-based file access requires explicit local-file boundary review" \
            "URL-backed initializers and URL/path-backed streams require explicit local-file boundary review" \
            "AppConfig authority changed outside the reviewed service seam" \
            "AppConfig construction is owned exclusively by AppConfigService" \
            "AppConfig staleness mutation is owned exclusively by AppConfigService" \
            "Dynamic invocation, unsafe memory, and runtime symbol lookup are forbidden inside the reviewed source boundary" \
            "Model deletion requires an explicitly reviewed lifecycle service" \
            "SwiftData backing-data APIs bypass reviewed model initialization" \
            "SchemaV1 persisted-property surface changed without backup-format review" \
            "BackupArchive DTOs must retain synthesized Codable and memberwise initialization" \
            "BackupArchive v1 decoder changed outside immutable compatibility contract" \
            "contentsOf URL loading is forbidden" \
            "Xcode build configurations changed outside the reviewed allowlist"
          do
            if ! grep -Fq "$expected" "$log"; then
              sed -n '1,280p' "$log"
              echo "error: sandboxed Xcode probe did not report: $expected"
              exit 1
            fi
          done

          echo "The sandboxed Xcode build ran the boundary phase and rejected every declared-input network, file-ingress, AppConfig-ownership, persisted-schema, current-backup-shape, historical-backup-decoder, loader, and configuration violation."

      - name: Build release configuration
        run: |
          xcodebuild build \
            -project Hippocrates.xcodeproj \
            -scheme Hippocrates \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Run static analyzer
        run: |
          xcodebuild analyze \
            -project Hippocrates.xcodeproj \
            -scheme Hippocrates \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Build and test
        run: |
          xcodebuild test \
            -project Hippocrates.xcodeproj \
            -scheme Hippocrates \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -resultBundlePath "$RUNNER_TEMP/HippocratesTests.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
