name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-${{ github.repository }}
  cancel-in-progress: true

jobs:
  opencode:
    if: |
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      ) && (
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /opencode') ||
        startsWith(github.event.comment.body, '/opencode')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Required by the fixed CLI's GitHub App token exchange.
      id-token: write
      contents: read
      # Used only by the pre-check for issue comments on pull requests.
      pull-requests: read
    steps:
      - name: Reject fork pull requests before checkout
        if: |
          github.event_name == 'pull_request_review_comment' ||
          github.event.issue.pull_request != null
        shell: bash
        env:
          BASE_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REVIEW_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "pull_request_review_comment" ]]; then
            head_repository="${REVIEW_HEAD_REPOSITORY}"
          else
            head_repository="$(
              gh api \
                "repos/${BASE_REPOSITORY}/pulls/${PR_NUMBER}" \
                --jq '.head.repo.full_name'
            )"
          fi

          test -n "${head_repository}"
          if [[ "${head_repository}" != "${BASE_REPOSITORY}" ]]; then
            printf 'OpenCode refuses fork pull request head: %s\n' \
              "${head_repository}" >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
          # Review-comment events otherwise default to the PR merge ref. Start
          # only from trusted default-branch content; the CLI may later fetch a
          # same-repository PR branch after the fork check above.
          ref: ${{ github.event.repository.default_branch }}

      - name: Install verified OpenCode CLI
        shell: bash
        run: |
          set -euo pipefail

          readonly archive="${RUNNER_TEMP}/opencode-linux-x64-v1.18.4.tar.gz"
          readonly install_dir="${RUNNER_TEMP}/opencode-v1.18.4"

          curl \
            --fail \
            --show-error \
            --silent \
            --location \
            --retry 3 \
            --retry-all-errors \
            --connect-timeout 30 \
            --max-time 300 \
            --proto '=https' \
            --proto-redir '=https' \
            --tlsv1.2 \
            --output "${archive}" \
            "https://github.com/anomalyco/opencode/releases/download/v1.18.4/opencode-linux-x64.tar.gz"

          printf '%s  %s\n' \
            'bab463c3fb3224d388bb7cfad63f38703df9cf0be2cfd2ce8cb49d886b53a174' \
            "${archive}" | sha256sum --check --strict

          mkdir -p "${install_dir}"
          tar \
            --extract \
            --gzip \
            --file "${archive}" \
            --directory "${install_dir}" \
            --no-same-owner

          test -x "${install_dir}/opencode"
          readonly installed_version="$("${install_dir}/opencode" --version)"
          test "${installed_version}" = "1.18.4"
          printf '%s\n' "${install_dir}" >> "${GITHUB_PATH}"

      - name: Run opencode
        shell: bash
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          MODEL: opencode/claude-sonnet-4-6
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
          OPENCODE_DISABLE_PROJECT_CONFIG: "true"
          USE_GITHUB_TOKEN: "false"
          SHARE: "false"
        run: opencode --pure github run
